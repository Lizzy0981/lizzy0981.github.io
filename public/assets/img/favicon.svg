<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f0d"/>
      <stop offset="100%" style="stop-color:#141d16"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#f87171"/>
      <stop offset="20%"  style="stop-color:#facc15"/>
      <stop offset="40%"  style="stop-color:#4ade80"/>
      <stop offset="60%"  style="stop-color:#38bdf8"/>
      <stop offset="80%"  style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#e879f9"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Rainbow bar top -->
  <rect x="0" y="0" width="32" height="2.5" rx="7" fill="url(#rainbow)"/>

  <!-- Subtle grid dots -->
  <circle cx="6"  cy="10" r="0.7" fill="#4ade80" opacity="0.12"/>
  <circle cx="16" cy="10" r="0.7" fill="#4ade80" opacity="0.12"/>
  <circle cx="26" cy="10" r="0.7" fill="#4ade80" opacity="0.12"/>
  <circle cx="6"  cy="22" r="0.7" fill="#4ade80" opacity="0.12"/>
  <circle cx="26" cy="22" r="0.7" fill="#4ade80" opacity="0.12"/>

  <!-- Letter E — stylized -->
  <text
    x="16"
    y="23"
    font-family="Georgia, serif"
    font-size="18"
    font-weight="700"
    text-anchor="middle"
    fill="url(#letter)"
  >E</text>

  <!-- Glow dot bottom right -->
  <circle cx="25" cy="25" r="2.5" fill="#4ade80" opacity="0.18"/>
  <circle cx="25" cy="25" r="1.2" fill="#4ade80" opacity="0.5"/>
</svg>
